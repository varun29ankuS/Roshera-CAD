# Roshera CAD frontend — nginx site config.
#
# Serves the built Vite SPA and reverse-proxies the two backend surfaces:
#   /api  -> REST        (http, backend:8081)
#   /ws   -> WebSocket   (upgrade, backend:8081/ws)
# `backend` is the api-server service name on the compose network.

upstream roshera_backend {
    server backend:8081;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown client-side routes fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST surface. Same-origin, so the SPA calls relative "/api/..." with an
    # empty VITE_API_URL.
    location /api/ {
        proxy_pass http://roshera_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket upgrade. The api-server exempts the /ws upgrade from auth
    # (auth_middleware::path_is_exempt) and authenticates over the socket.
    location /ws {
        proxy_pass http://roshera_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Long-lived socket: do not let the proxy time it out mid-session.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
