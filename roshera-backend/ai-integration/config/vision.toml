# Vision Pipeline Configuration
#
# Policy: API-only providers. Local-model runtimes (Ollama, LLaMA, Whisper,
# etc.) are not supported by this codebase. Supported providers are the
# hosted APIs listed below (OpenAI, Anthropic, Google, CustomAPI for tests).

# Default profile — Anthropic Claude
[default]
# Processing mode: "unified" or "separated"
# - unified: Single multimodal model handles both vision and reasoning
# - separated: Dedicated vision model + dedicated reasoning model
mode = "unified"

# Enable caching of vision analysis results
enable_cache = true
cache_ttl_secs = 300  # 5 minutes

# Retry settings
max_retries = 3

# Timeouts
vision_timeout_secs = 30
reasoning_timeout_secs = 20

# Vision model configuration
[default.vision]
provider = "Anthropic"
url = "https://api.anthropic.com/v1/messages"
model_name = "claude-3-5-sonnet-20241022"
api_key = "${ANTHROPIC_API_KEY}"

# Reasoning model configuration (only used in separated mode)
# If not specified, uses the same as vision
# [default.reasoning]
# provider = "Anthropic"
# url = "https://api.anthropic.com/v1/messages"
# model_name = "claude-3-5-sonnet-20241022"

# Development profile — OpenAI GPT-4o for quick iteration
[profiles.development]
mode = "unified"
enable_cache = true
cache_ttl_secs = 600  # 10 minutes

[profiles.development.vision]
provider = "OpenAI"
url = "https://api.openai.com/v1/chat/completions"
model_name = "gpt-4o-mini"
api_key = "${OPENAI_API_KEY}"

# Production profile — High quality with separated vision + reasoning models
[profiles.production]
mode = "separated"
enable_cache = true
cache_ttl_secs = 1800  # 30 minutes
max_retries = 5
vision_timeout_secs = 45
reasoning_timeout_secs = 30

[profiles.production.vision]
provider = "OpenAI"
url = "https://api.openai.com/v1/chat/completions"
model_name = "gpt-4o"
api_key = "${OPENAI_API_KEY}"

[profiles.production.reasoning]
provider = "Anthropic"
url = "https://api.anthropic.com/v1/messages"
model_name = "claude-3-5-sonnet-20241022"
api_key = "${ANTHROPIC_API_KEY}"

# Cloud profile — OpenAI
[profiles.cloud]
mode = "unified"
enable_cache = true
cache_ttl_secs = 3600  # 1 hour

[profiles.cloud.vision]
provider = "OpenAI"
url = "https://api.openai.com/v1/chat/completions"
model_name = "gpt-4o"
api_key = "${OPENAI_API_KEY}"

# Anthropic profile
[profiles.anthropic]
mode = "unified"
enable_cache = true

[profiles.anthropic.vision]
provider = "Anthropic"
url = "https://api.anthropic.com/v1/messages"
model_name = "claude-3-5-sonnet-20241022"
api_key = "${ANTHROPIC_API_KEY}"

# Google profile
[profiles.google]
mode = "unified"
enable_cache = true

[profiles.google.vision]
provider = "Google"
url = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent"
model_name = "gemini-1.5-pro"
api_key = "${GOOGLE_API_KEY}"

# Testing profile — Uses mock endpoint
[profiles.test]
mode = "unified"
enable_cache = false
max_retries = 1
vision_timeout_secs = 5
reasoning_timeout_secs = 5

[profiles.test.vision]
provider = "CustomAPI"
url = "http://localhost:8888/mock"
model_name = "mock-model"

# Model recommendations based on use case
#
# For general CAD work:
# - claude-3-5-sonnet (unified) — Strong reasoning, excellent tool use
#
# For complex spatial reasoning (separated mode):
# - gpt-4o (vision) + claude-3-5-sonnet (reasoning) — Best accuracy
#
# For fast prototyping / development:
# - gpt-4o-mini (unified) — Fast, cost-effective
#
# For multi-modal scenes:
# - gemini-1.5-pro (unified) — Strong long-context vision
