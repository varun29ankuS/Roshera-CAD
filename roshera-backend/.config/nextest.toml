# cargo-nextest configuration.
#
# slow-timeout is a safety net: it bounds any single test so a hang can never
# burn the whole CI job again. A test gets a SLOW warning at 60s; if it is still
# running after 5 such periods (5 min) nextest TERMINATES it and reports it as a
# timeout failure. 5 min is far above the slowest legitimate test (~3 min), so
# only genuine hangs are killed.
#
# NOTE on timeline-engine: its async tests drive an MPSC/DashMap recorder bridge
# under tokio and intermittently DEADLOCK when CPU-starved by the rest of the
# suite running in parallel on the 2-core runner (a different timeline test
# timed out each run). The fix is NOT a test-group here (a single timeline test
# still loses the cores to geometry-engine's thousands of parallel tests) but a
# separate, single-threaded nextest invocation in CI (see ci.yml: timeline-engine
# runs alone with --test-threads=1, after `--workspace --exclude timeline-engine`).
# The bridge race itself still needs a real fix — see the #[ignore]'d timeline
# tests. Locally `cargo test`/`cargo nextest` run the whole workspace fine.
[profile.default]
slow-timeout = { period = "60s", terminate-after = 5 }
