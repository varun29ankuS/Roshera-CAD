# cargo-nextest configuration.
#
# slow-timeout is a safety net: it bounds any single test so a hang can never
# burn the whole CI job again. A test gets a SLOW warning at 60s; if it is still
# running after 5 such periods (5 min) nextest TERMINATES it and reports it as a
# timeout failure. Before this, two stuck timeline-engine tests
# (validate_holds_after_random_op_sequence, fan_out_ten_siblings) ran >46 min
# and the job was cancelled at the runner limit — which also meant the cargo
# cache never saved, so every run rebuilt cold. 5 min is far above the slowest
# legitimate test (~3 min), so only genuine hangs are killed.
[profile.default]
slow-timeout = { period = "60s", terminate-after = 5 }
