# cargo-nextest configuration.
#
# slow-timeout is a backstop: any test still running after 5 min (60s warn ×
# terminate-after 5) is terminated and reported, so a hang can never burn the
# whole CI job. It was added when timeline-engine's tests intermittently
# deadlocked (a `Timeline::create_branch` DashMap shard self-deadlock — now
# fixed); it stays as cheap insurance against any future hang. 5 min is far
# above the slowest legitimate single test.
[profile.default]
slow-timeout = { period = "60s", terminate-after = 5 }

# torus_boolean_is_deterministic is the #37 determinism gate: it deliberately
# re-runs the torus/rim-poke boolean 5× for EACH of 3 ops (15 dense curved
# welds + 15 manifold reports in one process) and fingerprints every run —
# repetition IS the assertion, so neither the run count nor the fixture can
# shrink without weakening the gate (the cell historically returned three
# different volumes from order-dependent welding). A green CI run measured
# 289.9 s — 10 s under the 5-min backstop — and a slower runner tipped it
# over once. Give this single test a 10-min leash (120 s warn × 5) instead
# of weakening the determinism assertion or the fixture.
[[profile.default.overrides]]
filter = 'test(torus_boolean_is_deterministic)'
slow-timeout = { period = "120s", terminate-after = 5 }

# boolean_volume_proptest's containment properties (union==big, intersection==
# small) run many randomized dense curved-boolean cases per invocation; on a
# loaded CI runner the batch tipped over the 5-min backstop (both hit 300 s in
# run 29598613512) though each individual case is fast. Same treatment as the
# torus gate: a 10-min leash rather than shrinking the proptest case count,
# which would thin the randomized coverage that is the point of the property.
[[profile.default.overrides]]
filter = 'test(prop_containment_union_equals_big)'
slow-timeout = { period = "120s", terminate-after = 5 }

[[profile.default.overrides]]
filter = 'test(prop_containment_intersection_equals_small)'
slow-timeout = { period = "120s", terminate-after = 5 }
