version: '3.8'

services:
  api-server:
    build: .
    ports:
      - "3000:3000"
      - "9090:9090"
    environment:
      - RUST_LOG=info
      - SERVER_HOST=0.0.0.0
    volumes:
      - ./exports:/app/exports
    networks:
      - roshera-network

networks:
  roshera-network:
    driver: bridge
