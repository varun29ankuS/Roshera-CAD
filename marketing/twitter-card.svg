         x1="1012.58"
         y1="345"
         x2="900"
         y2="410"
         id="line15" />
      <line
         x1="900"
         y1="410"
         x2="787.42"
         y2="345"
         id="line16" />
      <!-- Top face outer hex -->
      <line
         x1="900"
         y1="150"
         x2="1012.58"
         y2="215"
         id="line17" />
      <line
         x1="787.42"
         y1="215"
         x2="900"
         y2="150"
         id="line18" />
      <!-- Verticals (front three) -->
      <line
         x1="900"
         y1="280"
         x2="900"
         y2="150"
         id="line19" />
      <line
         x1="1012.58"
         y1="345"
         x2="1012.58"
         y2="215"
         id="line20" />
      <line
         x1="787.42"
         y1="345"
         x2="787.42"
         y2="215"
         id="line21" />
    </g>
    <!-- Hidden edges (dashed, low opacity) — convey it's a real solid -->
    <g
       stroke-width="1.4"
       opacity="0.32"
       stroke-dasharray="5 5"
       stroke-linecap="round"
       id="g24">
      <line
         x1="1012.58"
         y1="215"
         x2="900"
         y2="280"
         id="line22" />
      <line
         x1="900"
