       y1="0"
       x2="-26"
       y2="15"
       stroke="#3498DB"
       stroke-width="2.6"
       stroke-linecap="round"
       id="line32" />
    <text
       x="48"
       y="5"
       fill="#E74C3C"
       id="text32">X</text>
    <text
       x="-4"
       y="-48"
       fill="#2ECC71"
       id="text33">Y</text>
    <text
