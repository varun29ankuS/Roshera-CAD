   width="1200"
   height="630"
   version="1.1"
   id="svg57"
   sodipodi:docname="twitter-card.svg"
   inkscape:version="1.4.2 (f4327f4, 2025-05-13)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview57"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="0.65793651"
     inkscape:cx="588.20265"
     inkscape:cy="289.54162"
     inkscape:window-width="1920"
     inkscape:window-height="1009"
     inkscape:window-x="-8"
     inkscape:window-y="-8"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg57" />
  <!--
    Roshera Twitter / Open Graph card — 1200 x 630 (Twitter summary_large_image,
    also matches Open Graph default). Mirrors the viewport's blueprint
    design tokens: cream paper background (#F4EFE2), steel-blue grid lines
    (#6A85A3 cells, #4A6481 sections), dark navy ink (#1A2F47), and the
    favicon's brand red (#C4524A) as the single saturated accent.

    Vector — exports cleanly to PNG at any DPI. Convert with:
      rsvg-convert -w 1200 -h 630 marketing/twitter-card.svg -o twitter-card.png
    or any SVG-to-PNG online tool. Twitter prefers PNG/JPG for cards.
  -->
  <defs
     id="defs3">
    <!-- Fine grid (50px cells), matches viewport `cellSize`. -->
    <pattern
       id="cells"
       width="50"
       height="50"
       patternUnits="userSpaceOnUse">
      <path
         d="M 50 0 L 0 0 L 0 50"
         fill="none"
         stroke="#6A85A3"
         stroke-width="1"
         opacity="0.18"
         id="path1" />
    </pattern>
    <!-- Section grid (250px), matches viewport `sectionSize`. -->
    <pattern
       id="sections"
       width="250"
       height="250"
       patternUnits="userSpaceOnUse">
      <path
         d="M 250 0 L 0 0 L 0 250"
         fill="none"
         stroke="#4A6481"
         stroke-width="1.5"
         opacity="0.32"
         id="path2" />
    </pattern>
    <!-- Subtle radial vignette so the eye lands on the wordmark + cube. -->
    <radialGradient
       id="vignette"
       cx="50%"
       cy="50%"
       r="75%">
      <stop
         offset="0%"
         stop-color="#F4EFE2"
         stop-opacity="0"
         id="stop2" />
      <stop
         offset="100%"
         stop-color="#3A4A60"
         stop-opacity="0.10"
         id="stop3" />
    </radialGradient>
  </defs>
  <!-- Cream paper -->
  <rect
     width="1200"
     height="630"
     fill="#F4EFE2"
     id="rect3" />
  <!-- Blueprint grid -->
  <rect
     width="1200"
     height="630"
     fill="url(#cells)"
     id="rect4" />
  <rect
     width="1200"
     height="630"
     fill="url(#sections)"
     id="rect5" />
  <!-- Vignette -->
  <rect
     width="1200"
     height="630"
     fill="url(#vignette)"
     id="rect6"
     inkscape:export-filename="rect6.png"
     inkscape:export-xdpi="96"
     inkscape:export-ydpi="96" />
  <!-- Wordmark + tagline + caption (left half) -->
  <g
     font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
     id="g13">
    <!-- Small label above the wordmark -->
    <text
       x="80"
       y="155"
       font-size="14"
       fill="#C4524A"
       letter-spacing="4"
       font-weight="700"
       id="text6">
      ROSHERA / GEOMETRY RUNTIME
    </text>
    <!-- Wordmark -->
    <text
       x="80"
       y="245"
       font-size="92"
       font-weight="800"
       letter-spacing="6"
       fill="#1A2F47"
       id="text7">
      ROSHERA
    </text>
    <!-- Tagline -->
    <text
       x="84"
       y="305"
       font-size="32"
       font-weight="500"
       fill="#2D4D70"
       id="text8">
      The agent runtime for geometry.
    </text>
    <!-- Sub-tagline -->
    <text
       x="84"
       y="345"
       font-size="18"
       font-weight="400"
       fill="#5C7894"
       id="text9">
      Native Rust B-Rep. Built so AI can read, reason, and modify it.
    </text>
    <!-- Tech caption row -->
    <g
       font-size="13"
       fill="#5C7894"
       letter-spacing="2.5"
       font-weight="600"
       id="g12">
      <text
         x="80"
         y="420"
         id="text10">B-REP KERNEL</text>
      <text
         x="240"
         y="420"
         id="text11">EVENT-SOURCED TIMELINE</text>
      <text
         x="510"
         y="420"
         id="text12">SEMANTIC READABLE/</text>
    </g>
    <!-- Domain footer -->
    <text
       x="80"
       y="570"
       font-size="13"
       fill="#1A2F47"
       letter-spacing="3"
       font-weight="700"
       opacity="0.7"
       id="text13">
      ROSHERA.DEV
    </text>
  </g>
  <!-- Iso wireframe cube (right half) — same primitive style as the kernel's
       create_box_3d output, drawn here as a marketing artifact. -->
