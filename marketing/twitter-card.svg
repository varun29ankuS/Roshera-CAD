    </g>
    <circle
       cx="900"
       cy="280"
       r="4.5"
       fill="#C4524A"
       stroke="#1A2F47"
       stroke-width="1.5"
       id="circle30" />
  </g>
  <!-- Tiny axis indicator — top-right corner. Conventional X=red Y=green Z=blue,
