       x2="42"
       y2="0"
       stroke="#E74C3C"
       stroke-width="2.6"
       stroke-linecap="round"
       id="line30" />
    <line
       x1="0"
       y1="0"
       x2="0"
       y2="-42"
       stroke="#2ECC71"
       stroke-width="2.6"
       stroke-linecap="round"
       id="line31" />
    <line
