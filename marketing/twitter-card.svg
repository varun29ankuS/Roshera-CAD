      <line
         x1="900"
         y1="280"
         x2="1012.58"
         y2="345"
         id="line13" />
      <line
         x1="787.42"
         y1="345"
         x2="900"
         y2="280"
         id="line14" />
      <!-- Bottom face outer hex -->
