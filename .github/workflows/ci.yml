name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'fix/**', 'feat/**' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Debuginfo for the 190+ test binaries exceeds runner disk (killed run 29547226449
  # with "No space left on device"); same no-debuginfo discipline as local dev.
  CARGO_PROFILE_DEV_DEBUG: "false"
  CARGO_PROFILE_TEST_DEBUG: "false"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    # Link every crate + the ~100 integration-test binaries with mold instead
    # of GNU ld. Linking (each test binary statically links the large
    # geometry-engine rlib) was the dominant cost of the cold build; mold is
    # 5-10x faster, which is what brings a cold build back inside the timeout.
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    # Bound a hung or runaway test run instead of GitHub's 6h default. A single
    # deadlocked test (e.g. the verify_api_key DashMap self-deadlock) would
    # otherwise burn the entire 6h job limit before being cancelled.
    #
    # 60 min (not 30): the cargo cache had gone cold (LRU-evicted while CI was
    # red on the fmt gate for days), so the workspace + every test binary must
    # compile from scratch — that alone is ~30-40 min on the 2-core runner,
    # plus the nextest run. A 30-min cap was cancelled before the build even
    # finished, so the cache never SAVED and every run stayed cold. This higher
    # cap lets one cold run complete and warm the cache; warm runs finish in
    # ~10-15 min (revisit/lower this once green is observed).
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Free disk space
      # The optimized test/dev profile produces larger artifacts; on a cold
      # (cache-miss) build the workspace + all deps + every nextest binary
      # overran the runner's ~14 GB root disk ("No space left on device").
      # Remove the preinstalled toolchains we don't use (~25-30 GB) up front.
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
          /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
          /usr/local/lib/node_modules 2>/dev/null || true
        sudo docker image prune -af 2>/dev/null || true
        df -h /

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config mold

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Enforce API-only AI provider policy (no local models)
      # CLAUDE.md mandates hosted-API providers only. This guard fails the
      # build if Ollama / LLaMA / Whisper / Candle identifiers are
      # reintroduced into the Rust backend or config files.
      run: |
        set -e
        PATTERN='\b(ollama|llama|whisper|candle)\b'
        # Scope: Rust sources, Cargo manifests, and config files under roshera-backend/.
        # Exclude generated indexes, docs, and legacy markdown.
        MATCHES=$(grep -RInE "$PATTERN" \
          --include='*.rs' --include='*.toml' --include='*.yaml' --include='*.yml' \
          roshera-backend/ \
          | grep -viE '^[^:]+:[^:]+:\s*(//|#).*' \
          || true)
        if [ -n "$MATCHES" ]; then
          echo "::error::Forbidden local-model identifiers found (API-only policy):"
          echo "$MATCHES"
          exit 1
        fi

    - name: Check formatting
      run: cargo fmt --all -- --check
      working-directory: ./roshera-backend
    
    - name: Run clippy
      # Clippy's own exit code is authoritative: nonzero on any error-level
      # lint (incl. the workspace's denied unwrap/expect/panic), zero on
      # warnings. The old `| tee | (! grep 'error\[E')` pipeline (no pipefail)
      # swallowed clippy lint failures — only numbered rustc errors tripped it.
      run: cargo clippy --all-targets --workspace
      working-directory: ./roshera-backend

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: nextest

    - name: Run tests (nextest)
      # nextest runs each test in its own process under a work-stealing
      # scheduler — substantially faster than libtest on a suite this size and
      # it prints a clean per-test failure summary. --no-fail-fast surfaces
      # every failing crate in one run; a slow/hung test is reported and the
      # 40 min job timeout bounds the cost. nextest does NOT execute doctests,
      # so they run separately afterwards.
      run: |
        # Full workspace in parallel. (timeline-engine was briefly run isolated
        # + single-threaded to dodge an intermittent hang; that hang — a
        # create_branch DashMap shard self-deadlock — is now fixed, so it runs
        # with everything else again. The slow-timeout in .config/nextest.toml
        # remains as a backstop for any future hang.) Doctests last (nextest
        # does not run them).
        cargo nextest run --workspace --no-fail-fast
        cargo test --workspace --doc --no-fail-fast
      working-directory: ./roshera-backend

    - name: Run kernel demo regression suite
      # Each demo asserts non-zero triangle counts and bbox invariants on
      # outputs from primitives, booleans, extrude/revolve, sweep/loft,
      # features, transforms, and pattern/draft. A regression in any of these
      # paths fails CI loudly. See plans/steady-sauteeing-nova.md Phase 3
      # ("demos become regression tests"). (demo_extrude_revolve and
      # demo_sweep_loft were each excluded while their pre-existing
      # revolve/loft non-manifold bugs were fixed; both now build valid
      # watertight-topology solids and are back in the gate.)
      run: |
        set -e
        for demo in demo_primitives demo_booleans demo_extrude_revolve \
                    demo_sweep_loft demo_features demo_transforms \
                    demo_pattern_draft; do
          echo "==> $demo"
          cargo run --release --example "$demo" -p geometry-engine
        done
      working-directory: ./roshera-backend

    # Benchmarks not yet implemented
    # - name: Run benchmarks (dry run)
    #   run: cargo bench --no-run
    #   working-directory: ./roshera-backend

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: roshera-app/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: ./roshera-app

    - name: Type check
      run: npx tsc -b
      working-directory: ./roshera-app

    - name: Lint
      run: npm run lint
      working-directory: ./roshera-app

    - name: Build
      run: npm run build
      working-directory: ./roshera-app

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run security audit
      run: cargo audit
      working-directory: ./roshera-backend
      continue-on-error: true

  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run benchmarks
      run: |
        # Run criterion benchmarks if they exist
        if cargo bench --workspace --no-run 2>/dev/null; then
          cargo bench --workspace -- --output-format bencher | tee bench-results.txt
        else
          echo "No benchmarks found, skipping"
        fi
      working-directory: ./roshera-backend

  performance:
    name: Performance Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-perf-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Install critcmp
      run: cargo install critcmp
    
    - name: Run benchmark baseline
      run: |
        git checkout ${{ github.event.pull_request.base.sha }}
        # Check if benchmark exists before running
        if cargo bench --bench geometry_bench --no-run 2>/dev/null; then
          cargo bench --bench geometry_bench -- --save-baseline main --output-format bencher | tee bench-results.json
        else
          echo "No benchmarks found in base branch"
          echo '{"results": []}' > bench-results.json
        fi
      working-directory: ./roshera-backend
    
    - name: Run benchmark comparison
      run: |
        git checkout ${{ github.event.pull_request.head.sha }}
        # Check if benchmark exists before running
        if cargo bench --bench geometry_bench --no-run 2>/dev/null; then
          cargo bench --bench geometry_bench -- --save-baseline pr --output-format bencher | tee bench-results.json
          if [ -d target/criterion/main ]; then
            critcmp main pr || echo "Benchmark comparison skipped"
          fi
        else
          echo "No benchmarks found in PR branch"
          echo '{"results": []}' > bench-results.json
        fi
      working-directory: ./roshera-backend

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, frontend, security]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build backend release
      run: cargo build --release
      working-directory: ./roshera-backend
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: roshera-app/package-lock.json

    - name: Build frontend release
      run: npm ci && npm run build
      working-directory: ./roshera-app

    - name: Create deployment artifact
      run: |
        mkdir -p deployment
        cp -r roshera-backend/target/release/* deployment/
        cp -r roshera-app/dist/* deployment/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: roshera-deployment
        path: deployment/
        retention-days: 30