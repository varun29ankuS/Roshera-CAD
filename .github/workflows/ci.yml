name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'fix/**', 'feat/**' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Debuginfo for the 190+ test binaries exceeds runner disk (killed run 29547226449
  # with "No space left on device"); same no-debuginfo discipline as local dev.
  CARGO_PROFILE_DEV_DEBUG: "false"
  CARGO_PROFILE_TEST_DEBUG: "false"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    # Link every crate + the ~100 integration-test binaries with mold instead
    # of GNU ld. Linking (each test binary statically links the large
    # geometry-engine rlib) was the dominant cost of the cold build; mold is
    # 5-10x faster, which is what brings a cold build back inside the timeout.
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    # Bound a hung or runaway test run instead of GitHub's 6h default. A single
    # deadlocked test (e.g. the verify_api_key DashMap self-deadlock) would
    # otherwise burn the entire 6h job limit before being cancelled.
    #
    # 60 min (not 30): the cargo cache had gone cold (LRU-evicted while CI was
    # red on the fmt gate for days), so the workspace + every test binary must
    # compile from scratch — that alone is ~30-40 min on the 2-core runner,
    # plus the nextest run. A 30-min cap was cancelled before the build even
    # finished, so the cache never SAVED and every run stayed cold. This higher
    # cap lets one cold run complete and warm the cache; warm runs finish in
    # ~10-15 min (revisit/lower this once green is observed).
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Free disk space
      # The optimized test/dev profile produces larger artifacts; on a cold
      # (cache-miss) build the workspace + all deps + every nextest binary
      # overran the runner's ~14 GB root disk ("No space left on device").
      # Remove the preinstalled toolchains we don't use (~25-30 GB) up front.
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
          /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
          /usr/local/lib/node_modules 2>/dev/null || true
        sudo docker image prune -af 2>/dev/null || true
        df -h /

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config mold

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Enforce API-only AI provider policy (no local models)
      # CLAUDE.md mandates hosted-API providers only. This guard fails the
      # build if Ollama / LLaMA / Whisper / Candle identifiers are
      # reintroduced into the Rust backend or config files.
      run: |
        set -e
        PATTERN='\b(ollama|llama|whisper|candle)\b'
        # Scope: Rust sources, Cargo manifests, and config files under roshera-backend/.
        # Exclude generated indexes, docs, and legacy markdown.
        MATCHES=$(grep -RInE "$PATTERN" \
          --include='*.rs' --include='*.toml' --include='*.yaml' --include='*.yml' \
          roshera-backend/ \
          | grep -viE '^[^:]+:[^:]+:\s*(//|#).*' \
          || true)
        if [ -n "$MATCHES" ]; then
          echo "::error::Forbidden local-model identifiers found (API-only policy):"
          echo "$MATCHES"
          exit 1
        fi

    - name: Check formatting
      run: cargo fmt --all -- --check
      working-directory: ./roshera-backend
    
    - name: Run clippy
      # Clippy's own exit code is authoritative: nonzero on any error-level
      # lint (incl. the workspace's denied unwrap/expect/panic), zero on
      # warnings. The old `| tee | (! grep 'error\[E')` pipeline (no pipefail)
      # swallowed clippy lint failures — only numbered rustc errors tripped it.
      run: cargo clippy --all-targets --workspace
      working-directory: ./roshera-backend

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: nextest

    - name: Run tests (nextest)
      # nextest runs each test in its own process under a work-stealing
      # scheduler — substantially faster than libtest on a suite this size and
      # it prints a clean per-test failure summary. --no-fail-fast surfaces
      # every failing crate in one run; a slow/hung test is reported and the
      # 40 min job timeout bounds the cost. nextest does NOT execute doctests,
      # so they run separately afterwards.
      run: |
        # Full workspace in parallel. (timeline-engine was briefly run isolated
        # + single-threaded to dodge an intermittent hang; that hang — a
        # create_branch DashMap shard self-deadlock — is now fixed, so it runs
        # with everything else again. The slow-timeout in .config/nextest.toml
        # remains as a backstop for any future hang.) Doctests last (nextest
        # does not run them).
        cargo nextest run --workspace --no-fail-fast
        cargo test --workspace --doc --no-fail-fast
      working-directory: ./roshera-backend

    - name: Run kernel demo regression suite
      # Each demo asserts non-zero triangle counts and bbox invariants on
      # outputs from primitives, booleans, extrude/revolve, sweep/loft,
      # features, transforms, and pattern/draft. A regression in any of these
      # paths fails CI loudly. See plans/steady-sauteeing-nova.md Phase 3
      # ("demos become regression tests"). (demo_extrude_revolve and
      # demo_sweep_loft were each excluded while their pre-existing
      # revolve/loft non-manifold bugs were fixed; both now build valid
      # watertight-topology solids and are back in the gate.)
      run: |
        set -e
        for demo in demo_primitives demo_booleans demo_extrude_revolve \
                    demo_sweep_loft demo_features demo_transforms \
                    demo_pattern_draft; do
          echo "==> $demo"
          cargo run --release --example "$demo" -p geometry-engine
        done
      working-directory: ./roshera-backend

    # Benchmarks not yet implemented
    # - name: Run benchmarks (dry run)
    #   run: cargo bench --no-run
    #   working-directory: ./roshera-backend

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: roshera-app/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: ./roshera-app

    - name: Type check
      run: npx tsc -b
      working-directory: ./roshera-app

    - name: Lint
      run: npm run lint
      working-directory: ./roshera-app

    - name: Build
      run: npm run build
      working-directory: ./roshera-app

  mcp-quality:
    # The jig ratchet (MCP scale architecture, Slice 5). Grades the agent tool
    # surface the way the fmt gate grades formatting: the minimal default surface
    # must stay under the token budget, every exposed param must be described
    # (schema hygiene = 100), and no tool may balloon past the per-tool ceiling.
    # Runs only when roshera-mcp/** changes (dorny/paths-filter, keeping the
    # existing whole-workflow push/PR triggers untouched).
    name: MCP Quality (jig ratchet)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Detect roshera-mcp changes
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          mcp:
            - 'roshera-mcp/**'

    - name: Setup Node.js
      if: steps.filter.outputs.mcp == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: roshera-mcp/package-lock.json

    - name: Setup Python
      if: steps.filter.outputs.mcp == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies + build dist
      if: steps.filter.outputs.mcp == 'true'
      run: |
        npm ci
        npm run build
      working-directory: ./roshera-mcp

    - name: Run green MCP tests
      if: steps.filter.outputs.mcp == 'true'
      # scale_s2.mjs guards the S2 scale invariants (surface flip 18/90,
      # meta-tool validation parity, find_tool ranking, TS<->Rust FNV-1a-64
      # registry hash) against the built dist — fully offline, no backend.
      #
      # test/auto_feedback.mjs is EXCLUDED on purpose: its STATIC half greps a
      # monolithic src/index.ts for per-tool server.tool() blocks + okp() /
      # perceive() / ROSHERA_MCP_AUTOVERIFY, but the S2 refactor split those out
      # of index.ts into per-domain tools/*.ts modules behind the ToolTable, so
      # those assertions are stale/red. It is tracked separately from this gate;
      # wiring it in here would fail CI on a known-stale test, not a regression.
      run: node test/scale_s2.mjs
      working-directory: ./roshera-mcp

    - name: Grade with jig (best-effort, non-blocking)
      if: steps.filter.outputs.mcp == 'true'
      # jig (github.com/Shodh-Labs/jig, the MCP report-card grader) is NOT
      # published to PyPI under a verifiable name: `pip install jig` resolves to
      # an UNRELATED git-hook framework (robmadole/jig), and `jig-mcp` does not
      # exist. So we attempt the real grader from its own source, verify the
      # installed CLI is actually the MCP grader (exposes `check`/`budget`), and
      # SKIP loudly otherwise — never mis-installing the PyPI shadow, never
      # failing CI on jig's absence. The fallback gate below is authoritative.
      continue-on-error: true
      run: |
        set +e
        NOTE() { echo "$1"; echo "$1" >> "$GITHUB_STEP_SUMMARY"; }
        echo "## MCP jig grader" >> "$GITHUB_STEP_SUMMARY"
        pip install "jig @ git+https://github.com/Shodh-Labs/jig@v0.4.0" >/tmp/jig_install.log 2>&1
        if command -v jig >/dev/null 2>&1 && jig --help 2>&1 | grep -Eq '\bcheck\b|\bbudget\b'; then
          NOTE "jig grader installed ($(jig --version 2>&1 | head -1)) — running check + budget."
          jig check --stdio "node dist/index.js" || NOTE "jig check reported findings (see log; fallback gate is authoritative)."
          jig budget --json || NOTE "jig budget reported findings (see log; fallback gate is authoritative)."
        else
          NOTE ":information_source: jig MCP grader not installable on this runner (PyPI \`jig\` is an unrelated git-hook tool; \`jig-mcp\` does not exist; the Shodh-Labs source install did not yield a \`check\`/\`budget\` CLI). Relying on the authoritative fallback gate below."
        fi
      working-directory: ./roshera-mcp

    - name: MCP budget + hygiene gate (authoritative)
      if: steps.filter.outputs.mcp == 'true'
      # The always-run, gate-authoritative grader. Speaks minimal MCP stdio to
      # the built server on both ROSHERA_MCP_SURFACE=minimal and =full, then
      # asserts the spec §5 Q5 budgets: minimal live-surface bill <= 8000 tok,
      # schema hygiene = 100 (every param described), per-tool <= 3.5x full-set
      # median except the wire-contract-fixed allowlist. tiktoken (o200k_base)
      # when installable, else the registry's chars/4 estimate.
      run: |
        pip install tiktoken >/dev/null 2>&1 || echo "tiktoken unavailable — gate falls back to chars/4 (registry-parity)"
        python tools/mcp_budget_gate.py
      working-directory: ./roshera-mcp

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run security audit
      run: cargo audit
      working-directory: ./roshera-backend
      continue-on-error: true

  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run benchmarks
      run: |
        # Run criterion benchmarks if they exist
        if cargo bench --workspace --no-run 2>/dev/null; then
          cargo bench --workspace -- --output-format bencher | tee bench-results.txt
        else
          echo "No benchmarks found, skipping"
        fi
      working-directory: ./roshera-backend

  performance:
    name: Performance Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-perf-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Install critcmp
      run: cargo install critcmp
    
    - name: Run benchmark baseline
      run: |
        git checkout ${{ github.event.pull_request.base.sha }}
        # Check if benchmark exists before running
        if cargo bench --bench geometry_bench --no-run 2>/dev/null; then
          cargo bench --bench geometry_bench -- --save-baseline main --output-format bencher | tee bench-results.json
        else
          echo "No benchmarks found in base branch"
          echo '{"results": []}' > bench-results.json
        fi
      working-directory: ./roshera-backend
    
    - name: Run benchmark comparison
      run: |
        git checkout ${{ github.event.pull_request.head.sha }}
        # Check if benchmark exists before running
        if cargo bench --bench geometry_bench --no-run 2>/dev/null; then
          cargo bench --bench geometry_bench -- --save-baseline pr --output-format bencher | tee bench-results.json
          if [ -d target/criterion/main ]; then
            critcmp main pr || echo "Benchmark comparison skipped"
          fi
        else
          echo "No benchmarks found in PR branch"
          echo '{"results": []}' > bench-results.json
        fi
      working-directory: ./roshera-backend

  deploy:
    name: Deploy (build + push images to GHCR)
    runs-on: ubuntu-latest
    needs: [test, frontend, security]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 45

    # The built-in GITHUB_TOKEN needs packages:write to push to GHCR; contents
    # stays read for checkout. This replaces the old "build a release and upload
    # an artifact that deploys nowhere" job with two container images a partner
    # instance can actually pull (see docker-compose.partner.yml).
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      BACKEND_IMAGE: ghcr.io/varun29ankus/roshera-cad
      FRONTEND_IMAGE: ghcr.io/varun29ankus/roshera-cad-frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v6
      with:
        context: ./roshera-backend
        file: ./roshera-backend/Dockerfile
        push: true
        tags: |
          ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          ${{ env.BACKEND_IMAGE }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v6
      with:
        context: ./roshera-app
        file: ./roshera-app/Dockerfile
        push: true
        tags: |
          ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          ${{ env.FRONTEND_IMAGE }}:latest
        # The public WebSocket URL is a per-partner value set at deploy time in
        # docker-compose.partner.yml (PUBLIC_WS_URL); the published image ships
        # a relative /ws default that partner compose overrides on build.
        build-args: |
          VITE_API_URL=
          VITE_WS_URL=/ws
        cache-from: type=gha
        cache-to: type=gha,mode=max