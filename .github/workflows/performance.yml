name: Performance Monitoring

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC

jobs:
  benchmark:
    name: Geometry Benchmarks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev pkg-config
    
    - name: Run geometry benchmarks
      run: |
        # Build and run the actual benchmark runner
        cargo build --release --bin bench_runner
        ./target/release/bench_runner > bench-results.json
      working-directory: ./roshera-backend

    - name: Fetch gh-pages branch
      run: git fetch origin gh-pages:gh-pages || echo "gh-pages branch does not exist yet"

    - name: Store benchmark results
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'customSmallerIsBetter'
        output-file-path: roshera-backend/bench-results.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: ${{ github.ref == 'refs/heads/main' }}
        comment-on-alert: true
        alert-threshold: '150%'
        fail-on-alert: false
        benchmark-data-dir-path: 'dev/bench'
        skip-fetch-gh-pages: true

  memory-profile:
    name: Memory Usage
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev pkg-config valgrind
    
    - name: Build release
      run: cargo build --release --bin api-server
      working-directory: ./roshera-backend
    
    - name: Memory leak detection
      run: |
        valgrind --tool=memcheck --leak-check=full --show-leak-kinds=all \
          --track-origins=yes --xml=yes --xml-file=valgrind-results.xml \
          ./target/release/api-server --help || true
      working-directory: ./roshera-backend
    
    - name: Upload memory report
      uses: actions/upload-artifact@v4
      with:
        name: memory-analysis
        path: roshera-backend/valgrind-results.xml

  load-test:
    name: WebSocket Load Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev pkg-config
    
    - name: Build server
      run: cargo build --release --bin api-server
      working-directory: ./roshera-backend
    
    - name: Start server
      run: ./target/release/api-server &
      working-directory: ./roshera-backend
      env:
        PORT: 3000
    
    - name: Wait for server
      run: sleep 5
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install load test tools
      run: npm install -g artillery
    
    - name: Create load test config
      run: |
        cat > load-test.yml << EOF
        config:
          target: 'ws://localhost:3000/ws'
          phases:
            - duration: 60
              arrivalRate: 10
        scenarios:
          - name: "WebSocket connections"
            engine: ws
            weight: 100
        EOF
    
    - name: Run load test
      run: artillery run load-test.yml --output load-results.json
    
    - name: Generate report
      run: artillery report load-results.json --output load-report.html
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: load-test-results
        path: |
          load-results.json
          load-report.html